name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  release-check:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Production boot smoke
        env:
          NODE_ENV: development
          DATABASE_URL: mongodb://localhost:27017/oj-ci-smoke
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-jwt-secret-32-characters-minimum
          REFRESH_TOKEN_SECRET: ci-refresh-secret-32-characters
          COOKIE_SECRET: ci-cookie-secret-32-characters-min
        run: |
          node dist/server.js &
          pid=$!
          sleep 5
          kill $pid
          wait $pid 2>/dev/null || test $? -eq 143

      - name: Release check
        run: npm run release:check
